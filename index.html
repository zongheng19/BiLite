<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BiLite</title>
  <link rel="stylesheet" href="/src/styles/reset.css" />
  <link rel="stylesheet" href="/src/styles/variables.css" />
  <link rel="stylesheet" href="/src/styles/theme-dark.css" />
  <link rel="stylesheet" href="/src/styles/theme-light.css" />
  <link rel="stylesheet" href="/src/styles/player.css" />
  <link rel="stylesheet" href="/src/styles/progress.css" />
  <link rel="stylesheet" href="/src/styles/panels.css" />
  <link rel="stylesheet" href="/src/styles/wizard.css" />
</head>
<body data-theme="dark">
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <symbol id="icon-play" viewBox="0 0 24 24"><path fill="currentColor" d="M8 5.14v13.72a1 1 0 0 0 1.5.86l11.4-6.86a1 1 0 0 0 0-1.72L9.5 4.28A1 1 0 0 0 8 5.14z"/></symbol>
      <symbol id="icon-pause" viewBox="0 0 24 24"><path fill="currentColor" d="M7 4h4v16H7zM13 4h4v16h-4z"/></symbol>
      <symbol id="icon-volume-high" viewBox="0 0 24 24"><path fill="currentColor" d="M3 10v4a1 1 0 0 0 1 1h3l4 4a1 1 0 0 0 1.7-.7V5.7A1 1 0 0 0 11 5l-4 4H4a1 1 0 0 0-1 1zm12.5 2a4.5 4.5 0 0 0-2.5-4v8a4.5 4.5 0 0 0 2.5-4zM13 3.2v2.06a7 7 0 0 1 0 13.48v2.06A9 9 0 0 0 13 3.2z"/></symbol>
      <symbol id="icon-volume-mid" viewBox="0 0 24 24"><path fill="currentColor" d="M3 10v4a1 1 0 0 0 1 1h3l4 4a1 1 0 0 0 1.7-.7V5.7A1 1 0 0 0 11 5l-4 4H4a1 1 0 0 0-1 1zm12.5 2a4.5 4.5 0 0 0-2.5-4v8a4.5 4.5 0 0 0 2.5-4z"/></symbol>
      <symbol id="icon-volume-low" viewBox="0 0 24 24"><path fill="currentColor" d="M3 10v4a1 1 0 0 0 1 1h3l4 4a1 1 0 0 0 1.7-.7V5.7A1 1 0 0 0 11 5l-4 4H4a1 1 0 0 0-1 1z"/></symbol>
      <symbol id="icon-volume-mute" viewBox="0 0 24 24"><path fill="currentColor" d="M3 10v4a1 1 0 0 0 1 1h3l4 4a1 1 0 0 0 1.7-.7V5.7A1 1 0 0 0 11 5l-4 4H4a1 1 0 0 0-1 1zm17.7 7.3l-2.3-2.3 2.3-2.3-1.4-1.4-2.3 2.3-2.3-2.3-1.4 1.4 2.3 2.3-2.3 2.3 1.4 1.4 2.3-2.3 2.3 2.3z"/></symbol>
      <symbol id="icon-fullscreen" viewBox="0 0 24 24"><path fill="currentColor" d="M5 5h5v2H7v3H5V5zm9 0h5v5h-2V7h-3V5zM5 14h2v3h3v2H5v-5zm12 0h2v5h-5v-2h3v-3z"/></symbol>
      <symbol id="icon-fullscreen-exit" viewBox="0 0 24 24"><path fill="currentColor" d="M9 9V5H7v2H5v2h4zm6-4v4h4V7h-2V5h-2zM5 15h2v2h2v2H5v-4zm14 0v4h-4v-2h2v-2h2z"/></symbol>
      <symbol id="icon-subtitle" viewBox="0 0 24 24"><path fill="currentColor" d="M4 5h16a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2zm2 9v2h6v-2H6zm8 0v2h4v-2h-4zM6 10v2h2v-2H6zm4 0v2h8v-2h-8z"/></symbol>
      <symbol id="icon-playlist" viewBox="0 0 24 24"><path fill="currentColor" d="M3 6h13v2H3V6zm0 5h13v2H3v-2zm0 5h8v2H3v-2zm15-6.5v8l6-4-6-4z"/></symbol>
      <symbol id="icon-check" viewBox="0 0 24 24"><path fill="currentColor" d="M9 16.2L4.8 12l-1.4 1.4L9 19l12-12-1.4-1.4z"/></symbol>
    </defs>
  </svg>
  <div id="app">
    <div id="player-container">
      <div id="empty-state">
        <div class="empty-content">
          <svg class="empty-icon" viewBox="0 0 96 96"><path fill="currentColor" d="M48 8C25.9 8 8 25.9 8 48s17.9 40 40 40 40-17.9 40-40S70.1 8 48 8zm0 72c-17.6 0-32-14.4-32-32s14.4-32 32-32 32 14.4 32 32-14.4 32-32 32zm-8-46.4v28.8L64 48 40 33.6z"/></svg>
          <h2 class="empty-title">BiLite</h2>
          <p class="empty-hint">拖拽视频文件到窗口，或点击下方按钮打开</p>
          <button class="empty-btn" id="btn-open-file">打开视频文件</button>
          <p class="empty-tips">
            支持 MP4 / MKV / AVI / MOV / WebM 等常见格式
          </p>
        </div>
        <div class="empty-recent" id="empty-recent" style="display:none">
          <div class="recent-label">继续观看</div>
          <button class="recent-card" id="recent-card">
            <div class="recent-thumb">
              <svg viewBox="0 0 24 24"><path fill="currentColor" d="M8 5.14v13.72a1 1 0 0 0 1.5.86l11.4-6.86a1 1 0 0 0 0-1.72L9.5 4.28A1 1 0 0 0 8 5.14z"/></svg>
            </div>
            <div class="recent-info">
              <div class="recent-name" id="recent-name"></div>
              <div class="recent-meta">
                <span id="recent-position">00:00</span>
                <span class="recent-meta-sep">/</span>
                <span id="recent-duration">00:00</span>
                <span class="recent-progress-wrap">
                  <span class="recent-progress-bar"><span class="recent-progress-fill" id="recent-progress"></span></span>
                </span>
              </div>
            </div>
          </button>
        </div>
      </div>
      <div id="top-bar" class="auto-hide">
        <div class="top-bar-left" data-tauri-drag-region>
          <span class="app-brand">BiLite</span>
          <span class="video-title" id="video-title"></span>
        </div>
        <div class="top-bar-right">
          <button class="win-btn" id="btn-min" title="最小化" aria-label="最小化">
            <svg viewBox="0 0 12 12"><line x1="2" y1="6" x2="10" y2="6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
          </button>
          <button class="win-btn" id="btn-max" title="最大化" aria-label="最大化">
            <svg viewBox="0 0 12 12"><rect x="2.5" y="2.5" width="7" height="7" fill="none" stroke="currentColor" stroke-width="1.2" rx="1"/></svg>
          </button>
          <button class="win-btn win-btn-close" id="btn-close" title="关闭" aria-label="关闭">
            <svg viewBox="0 0 12 12"><line x1="3" y1="3" x2="9" y2="9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><line x1="9" y1="3" x2="3" y2="9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
          </button>
        </div>
      </div>
      <div id="subtitle-layer"></div>
      <div id="speed-toast" class="speed-toast">
        <svg class="icon" viewBox="0 0 24 24"><path fill="currentColor" d="M4 5v14l8-7zm10 0v14l8-7z"/></svg>
        <span class="speed-toast-text">3x 倍速中</span>
      </div>
      <div id="volume-toast" class="center-toast">
        <svg class="center-toast-icon" viewBox="0 0 24 24"><use href="#icon-volume-high"/></svg>
        <div class="center-toast-bar"><div class="center-toast-fill" id="volume-toast-fill"></div></div>
        <span class="center-toast-value" id="volume-toast-value">0</span>
      </div>
      <div id="control-bar" class="auto-hide">
        <div id="progress-area">
          <div class="progress-bar">
            <div class="progress-buffer"></div>
            <div class="progress-played"></div>
            <div class="progress-thumb"></div>
          </div>
          <div class="progress-tooltip"></div>
        </div>
        <div id="controls">
          <div class="left">
            <button class="ctrl-btn play-btn" id="btn-play" title="播放/暂停 (空格)">
              <svg class="icon"><use href="#icon-play"/></svg>
            </button>
            <span class="time-display" id="time-display" title="点击跳转到指定时间">
              <span id="time-current">00:00</span><span class="time-sep">/</span><span id="time-duration">00:00</span>
            </span>
            <input type="text" class="time-input" id="time-input" placeholder="00:00" />
          </div>
          <div class="right">
            <div class="hover-wrap" id="speed-wrap">
              <button class="ctrl-btn speed-btn" id="btn-speed" title="倍速">倍速</button>
            </div>
            <div class="hover-wrap" id="subtitle-wrap">
              <button class="ctrl-btn text-btn" id="btn-subtitle" title="字幕">字幕</button>
            </div>
            <div class="volume-wrap" id="volume-wrap">
              <button class="ctrl-btn icon-btn" id="btn-volume" title="静音 (M)">
                <svg class="icon"><use href="#icon-volume-high"/></svg>
              </button>
              <div class="volume-slider" id="volume-slider">
                <div class="volume-slider-track">
                  <div class="volume-slider-fill" id="volume-fill"></div>
                  <div class="volume-slider-thumb" id="volume-thumb"></div>
                </div>
                <span class="volume-value" id="volume-value">100</span>
              </div>
            </div>
            <button class="ctrl-btn icon-btn" id="btn-fullscreen" title="全屏 (F)">
              <svg class="icon"><use href="#icon-fullscreen"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
